<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <!-- React + Babel + Chart.js via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273549;
      --accent: #6366f1;
      --accent2: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #334155;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }

    .sidebar-logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent2);
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo i { font-size: 1.4rem; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.9rem;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active { color: var(--accent2); border-left-color: var(--accent); background: var(--surface2); }
    .nav-item i { width: 18px; text-align: center; }

    .main {
      margin-left: 220px;
      flex: 1;
      padding: 28px;
      max-width: calc(100vw - 220px);
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
    }

    .page-title span { color: var(--accent2); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stat-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .stat-icon.balance { background: rgba(99,102,241,0.15); color: var(--accent2); }
    .stat-icon.income  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .stat-icon.expense { background: rgba(239,68,68,0.15);  color: var(--red); }
    .stat-icon.count   { background: rgba(245,158,11,0.15); color: var(--yellow); }

    .stat-info label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-info .value { font-size: 1.4rem; font-weight: 700; margin-top: 2px; }
    .stat-info .value.pos { color: var(--green); }
    .stat-info .value.neg { color: var(--red); }
    .stat-info .value.neutral { color: var(--text); }

    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .chart-wrap { position: relative; height: 220px; }

    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 16px;
    }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }

    .form-group input, .form-group select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .form-group select option { background: var(--surface2); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn-add {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .btn-add:hover { background: var(--accent2); }
    .tx-list { max-height: 320px; overflow-y: auto; }
    .tx-list::-webkit-scrollbar { width: 4px; }
    .tx-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .tx-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .tx-item:last-child { border-bottom: none; }

    .tx-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tx-dot.income  { background: var(--green); }
    .tx-dot.expense { background: var(--red); }

    .tx-desc { flex: 1; font-size: 0.9rem; }
    .tx-cat  { font-size: 0.75rem; color: var(--muted); }

    .tx-amount { font-weight: 600; font-size: 0.95rem; }
    .tx-amount.pos { color: var(--green); }
    .tx-amount.neg { color: var(--red); }

    .tx-date { font-size: 0.75rem; color: var(--muted); min-width: 70px; text-align: right; }

    .btn-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all 0.2s;
      font-size: 0.8rem;
    }

    .btn-del:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active, .filter-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 32px 0;
      font-size: 0.9rem;
    }

    .empty i { font-size: 2rem; margin-bottom: 8px; display: block; }

    .cat-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .charts-row, .bottom-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .sidebar { width: 60px; }
      .sidebar-logo span, .nav-item span { display: none; }
      .main { margin-left: 60px; padding: 16px; max-width: calc(100vw - 60px); }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="expense.js"></script>
</body>
</html>
